name: Checkpoint
options:
  bundleIdPrefix: com.houwert
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Checkpoint:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.houwert.checkpoint
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: CKZT75PN5T
        ENABLE_HARDENED_RUNTIME: true
        ENABLE_USER_SCRIPT_SANDBOXING: false
    entitlements:
      path: Sources/Resources/Checkpoint.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true

  CheckpointTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Checkpoint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.houwert.checkpoint-tests
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: CKZT75PN5T
        GENERATE_INFOPLIST_FILE: true
